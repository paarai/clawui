name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xdotool \
            libatspi2.0-dev \
            gir1.2-atspi-2.0 \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install PyGObject
          pip install -e "skills/gui-automation[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/test_unit.py -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            libcairo2-dev \
            libatspi2.0-dev \
            gir1.2-atspi-2.0 \
            pkg-config

      - name: Install dependencies
        run: |
          pip install PyGObject
          pip install -e "skills/gui-automation"

      - name: Check syntax
        run: |
          python -m py_compile skills/gui-automation/src/agent.py
          python -m py_compile skills/gui-automation/src/perception.py
          python -m py_compile skills/gui-automation/src/cdp_helper.py
          python -m py_compile skills/gui-automation/src/actions.py
          python -m py_compile skills/gui-automation/src/cli.py
