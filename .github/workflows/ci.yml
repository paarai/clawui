name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-atspi-2.0 \
            python3-gi \
            libgirepository1.0-dev \
            gobject-introspection \
            xdotool \
            tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install PyGObject
          pip install -e ".[dev]"
          pip install pytest pytest-timeout

      - name: Run tests
        run: pytest tests/test_unit.py -v --timeout=120

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check clawui/ --ignore E402

      - name: Format check (changed files only)
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep '^clawui/.*\.py$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed Python files to format-check."
          else
            ruff format --check $CHANGED
          fi
